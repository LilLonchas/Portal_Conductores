<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificados Privados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .boton-archivo:active { transform: scale(0.96); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        /* Visor Flotante */
        #visor-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; }
        #pdf-frame { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div id="login-screen" class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
        <div class="text-5xl mb-4">🔐</div>
        <h2 class="text-2xl font-bold mb-2">Acceso Empresa</h2>
        <input type="password" id="pass-input" class="w-full p-4 border-2 rounded-xl mb-4 text-center text-2xl outline-none focus:border-blue-500" placeholder="****" inputmode="numeric">
        <button onclick="verificar()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">ENTRAR</button>
        <p id="error-msg" class="text-red-500 mt-4 text-xs font-bold hidden">CÓDIGO INCORRECTO</p>
    </div>

    <div id="app-screen" class="hidden w-full max-w-md min-h-screen bg-slate-50 self-start shadow-2xl flex flex-col">
        <nav class="bg-blue-900 text-white p-6 sticky top-0 z-50">
            <h1 class="text-lg font-bold text-center uppercase">Certificados Disponibles</h1>
        </nav>
        <div class="p-5 flex-1">
            <input type="text" id="buscador" onkeyup="filtrar()" placeholder="Escribe tu nombre..." class="w-full p-4 rounded-2xl border-none shadow-md outline-none mb-6">
            <div id="lista-archivos" class="space-y-3"></div>
        </div>
    </div>

    <div id="visor-modal">
        <div class="p-4 flex justify-between items-center bg-slate-900 text-white">
            <span id="visor-nombre" class="text-xs font-bold truncate pr-4">Documento</span>
            <button onclick="cerrarVisor()" class="bg-red-600 px-4 py-2 rounded-lg font-bold text-xs uppercase">Cerrar X</button>
        </div>
        <iframe id="pdf-frame" src=""></iframe>
    </div>

    <script>

        const banderas = { 'be':'be', 'de':'de', 'fr':'fr', 'gb':'gb', 'nl':'nl', 'es':'es', 'pt':'pt', 'it':'it' };

        function verificar() {
            if (document.getElementById('pass-input').value === CLAVE_ACCESO) {
                document.getElementById('login-screen').remove();
                document.getElementById('app-screen').classList.remove('hidden');
                cargarArchivos();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        async function cargarArchivos() {
            const lista = document.getElementById('lista-archivos');
            lista.innerHTML = '<p class="text-center py-10 text-gray-400 italic">Sincronizando certificados...</p>';
            try {
                const res = await fetch('https://api.dropboxapi.com/2/files/list_folder', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${DROPBOX_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "path": "", "recursive": true })
                });
                const data = await res.json();
                renderizar(data.entries || []);
            } catch (e) { console.error(e); }
        }

        async function previsualizar(path, nombre) {
            document.getElementById('visor-nombre').innerText = nombre;
            document.getElementById('visor-modal').style.display = 'flex';
            const frame = document.getElementById('pdf-frame');
            frame.src = ""; // Limpiar antes

            try {
                // Obtenemos link temporal directo (evita problemas de permisos de sharing)
                const res = await fetch('https://api.dropboxapi.com/2/files/get_temporary_link', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${DROPBOX_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "path": path })
                });
                const data = await res.json();
                
                if (data.link) {
                    // Usamos un visor externo que sí permite enmarcar PDFs de Dropbox
                    frame.src = `https://docs.google.com/viewer?url=${encodeURIComponent(data.link)}&embedded=true`;
                }
            } catch (e) {
                alert("No se pudo cargar la vista previa.");
                cerrarVisor();
            }
        }

        function cerrarVisor() {
            document.getElementById('visor-modal').style.display = 'none';
            document.getElementById('pdf-frame').src = "";
        }

        function renderizar(archivos) {
            const lista = document.getElementById('lista-archivos');
            lista.innerHTML = '';
            archivos.filter(a => a[".tag"] !== "folder").sort((a,b) => a.name.localeCompare(b.name)).forEach(archivo => {
                const nombreL = archivo.name.toLowerCase();
                let cp = null;
                for (let k in banderas) { if (nombreL.includes(`_${k}_`)) { cp = banderas[k]; break; } }
                
                const card = `
                    <div class="item fade-in bg-white rounded-2xl shadow-sm border border-gray-100 mb-3 overflow-hidden boton-archivo">
                        <button onclick="previsualizar('${archivo.path_lower}', '${archivo.name}')" class="w-full flex items-center p-4 text-left">
                            <div class="w-10 h-7 flex-shrink-0 bg-slate-100 rounded flex items-center justify-center border">
                                ${cp ? `<img src="https://flagcdn.com/w80/${cp}.png" class="h-full object-cover">` : `<span class="text-[8px] font-bold text-slate-400 uppercase">PDF</span>`}
                            </div>
                            <div class="ml-4">
                                <h3 class="text-slate-800 font-bold text-xs uppercase truncate w-48">${archivo.name.replace('.pdf','').replace(/_/g,' ')}</h3>
                                <p class="text-blue-600 text-[9px] font-black uppercase mt-1">Ver en pantalla ❯</p>
                            </div>
                        </button>
                    </div>`;
                lista.insertAdjacentHTML('beforeend', card);
            });
        }

        function filtrar() {
            const v = document.getElementById('buscador').value.toLowerCase();
            const items = document.getElementsByClassName('item');
            for(let i of items) i.style.display = i.innerText.toLowerCase().includes(v) ? "block" : "none";
        }
    </script>
</body>
</html>
