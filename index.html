<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Certificados Oficiales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

<!-- ═══════════════════════════════════════════
     PANTALLA DE LOGIN
═══════════════════════════════════════════ -->
<div id="login-screen" class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center fade-in">
    <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
    </div>
    <h2 class="text-2xl font-black text-slate-800 mb-1">Acceso Privado</h2>
    <p class="text-slate-400 text-sm mb-6">Introduce tu PIN o DNI</p>

    <input
        type="password"
        id="pass-input"
        class="w-full p-4 border-2 border-slate-200 rounded-2xl mb-4 text-center text-xl outline-none focus:border-blue-500 font-mono transition-colors"
        placeholder="••••••••"
        autocomplete="off"
        onkeydown="if(event.key==='Enter') verificar()"
    >
    <button
        id="btn-login"
        onclick="verificar()"
        class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all uppercase tracking-widest flex items-center justify-center gap-2"
    >
        <span id="btn-login-text">Entrar</span>
        <svg id="btn-login-spinner" class="hidden h-5 w-5 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
    </button>
    <div id="error-area" class="mt-4 min-h-[20px]">
        <p id="error-msg" class="text-red-500 text-xs font-bold uppercase hidden"></p>
        <p id="bloqueo-msg" class="text-red-700 text-xs font-bold uppercase hidden">
            Demasiados intentos. Espera <span id="countdown">30</span>s
        </p>
    </div>
</div>

<!-- ═══════════════════════════════════════════
     PANTALLA DE BIENVENIDA
═══════════════════════════════════════════ -->
<div id="welcome-screen" class="hidden fixed inset-0 welcome-bg z-[9998] flex items-center justify-center p-6">
    <div class="text-center fade-in">

        <!-- Avatar con iniciales -->
        <div id="welcome-avatar" class="w-24 h-24 rounded-3xl bg-blue-500 flex items-center justify-center mx-auto mb-6 text-3xl font-black text-white shadow-2xl shadow-blue-900">
            ??
        </div>

        <p class="text-blue-300 text-[10px] uppercase tracking-widest font-black mb-2">Bienvenido al portal</p>
        <h2 id="welcome-nombre" class="text-2xl font-black text-white uppercase mb-2 leading-tight"></h2>
        <p id="welcome-docs" class="text-blue-400 text-xs font-bold mb-10"></p>

        <!-- Barra de progreso -->
        <div class="w-48 h-1 bg-blue-900 rounded-full mx-auto mb-6 overflow-hidden">
            <div id="welcome-progress" class="h-full bg-blue-400 rounded-full welcome-progress-bar"></div>
        </div>

        <button
            onclick="irAlPortal()"
            class="bg-white text-blue-900 font-black px-10 py-3 rounded-2xl uppercase tracking-widest text-sm hover:bg-blue-50 transition-all active:scale-95 shadow-xl"
        >
            Acceder →
        </button>
        <p class="text-blue-500 text-[9px] mt-3 uppercase font-bold tracking-wider">o espera un momento</p>
    </div>
</div>

<!-- ═══════════════════════════════════════════
     PANTALLA PRINCIPAL
═══════════════════════════════════════════ -->
<div id="app-screen" class="hidden w-full max-w-md min-h-screen bg-slate-50 self-start shadow-2xl flex flex-col">

    <nav class="text-white p-5 sticky top-0 z-50 shadow-lg flex justify-between items-center nav-bg">
        <div>
            <h1 id="saludo-usuario" class="text-sm font-black uppercase tracking-tight leading-none truncate max-w-[200px]">Certificados</h1>
            <p id="sub-titulo" class="text-[9px] text-blue-300 uppercase mt-1 font-bold tracking-widest">Panel de Control</p>
        </div>
        <button
            onclick="location.reload()"
            class="flex items-center gap-1.5 bg-red-600 hover:bg-red-700 active:scale-95 text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase transition-all"
        >
            Salir
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
        </button>
    </nav>

    <div class="p-4 pb-0">
        <div class="relative">
            <svg class="absolute left-4 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/>
            </svg>
            <input
                type="text"
                id="buscador"
                onkeyup="filtrar()"
                placeholder="Buscar conductor o certificado..."
                class="w-full p-3.5 pl-11 rounded-2xl border-none shadow-md outline-none text-slate-600 focus:ring-2 focus:ring-blue-400 text-sm transition-all"
            >
        </div>
        <p id="contador" class="text-[10px] text-slate-400 font-bold uppercase text-right mt-2 pr-1"></p>
    </div>

    <div class="p-4 flex-1">
        <div id="lista-archivos" class="pb-10"></div>
    </div>

    <footer class="p-4 text-center border-t border-slate-200">
        <p class="text-slate-400 text-[9px] font-bold uppercase tracking-widest">© 2026 Portal Oficial</p>
    </footer>
</div>

<!-- ═══════════════════════════════════════════
     VISOR PDF
═══════════════════════════════════════════ -->
<div id="visor-modal">
    <div class="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-slate-700 gap-3 flex-shrink-0">
        <div class="flex items-center gap-2 flex-1 min-w-0">
            <svg class="h-4 w-4 text-red-400 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
            </svg>
            <span id="visor-nombre" class="text-[10px] font-bold text-white truncate uppercase tracking-wide"></span>
        </div>
        <div class="flex gap-2 flex-shrink-0">
            <div id="paginacion" class="hidden items-center gap-1">
                <button onclick="cambiarPagina(-1)" class="bg-slate-700 hover:bg-slate-600 text-white px-2 py-1.5 rounded-lg text-[10px] font-bold">‹</button>
                <span id="info-pagina" class="text-[10px] text-slate-300 font-bold px-1"></span>
                <button onclick="cambiarPagina(1)" class="bg-slate-700 hover:bg-slate-600 text-white px-2 py-1.5 rounded-lg text-[10px] font-bold">›</button>
            </div>
            <a id="btn-descargar" href="#" download class="bg-blue-600 hover:bg-blue-500 active:scale-95 text-white px-3 py-1.5 rounded-lg font-black text-[10px] uppercase transition-all flex items-center gap-1">
                <svg class="h-3 w-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                Descargar
            </a>
            <button onclick="cerrarVisor()" class="bg-red-600 hover:bg-red-500 active:scale-95 text-white px-3 py-1.5 rounded-lg font-black text-[10px] uppercase transition-all">✕</button>
        </div>
    </div>
    <div id="pdf-loading" class="flex-1 flex flex-col items-center justify-center text-white gap-4">
        <svg class="h-10 w-10 animate-spin text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        <p class="text-xs text-slate-400 uppercase font-bold tracking-widest">Cargando documento...</p>
    </div>
    <div id="pdf-container" class="hidden flex-1"></div>
</div>

<!-- Orden de carga: config → usuarios → app -->
<script src="js/config.js"></script>
<script src="js/usuarios.js"></script>
<script src="js/app.js"></script>

</body>
</html>
