        let currentToken = "";

        // --- LÓGICA DE DROPBOX (SIN CAMBIOS) ---
        async function refreshAccessToken() {
            try {
                const response = await fetch('https://api.dropboxapi.com/oauth2/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        'grant_type': 'refresh_token',
                        'refresh_token': REFRESH_TOKEN.trim(),
                        'client_id': APP_KEY.trim(),
                        'client_secret': APP_SECRET.trim()
                    })
                });
                const data = await response.json();
                return data.access_token;
            } catch (e) { return null; }
        }

        async function verificar() {
            const inputVal = document.getElementById('pass-input').value.trim();
            let usuario = USUARIOS[inputVal] || USUARIOS[inputVal.toUpperCase()];

            if (usuario) {
                usuarioIdentificado = usuario;
                document.getElementById('login-screen').remove();
                document.getElementById('app-screen').classList.remove('hidden');
                
                if(usuarioIdentificado === "ADMIN_MASTER") {
                    document.getElementById('saludo-usuario').innerText = "ADMINISTRACIÓN";
                    document.getElementById('saludo-usuario').classList.add('text-yellow-400');
                    document.getElementById('sub-titulo').innerText = "Acceso Maestro Activado";
                } else {
                    document.getElementById('saludo-usuario').innerText = usuarioIdentificado.replace(/_/g, ' ');
                }
                
                currentToken = await refreshAccessToken();
                if (currentToken) cargarArchivos();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
                document.getElementById('pass-input').value = "";
            }
        }

        async function cargarArchivos() {
            const lista = document.getElementById('lista-archivos');
            lista.innerHTML = '<div class="text-center py-20 animate-pulse text-gray-400 text-[10px] uppercase font-bold tracking-widest">Sincronizando Base de Datos...</div>';

            try {
                let todosLosArchivos = [];
                let tieneMas = true;
                let cursor = "";

                while (tieneMas) {
                    const url = cursor ? 'https://api.dropboxapi.com/2/files/list_folder/continue' : 'https://api.dropboxapi.com/2/files/list_folder';
                    const cuerpo = cursor ? JSON.stringify({ "cursor": cursor }) : JSON.stringify({ "path": "", "recursive": true });

                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${currentToken}`, 'Content-Type': 'application/json' },
                        body: cuerpo
                    });
                    
                    const data = await res.json();
                    if (data.entries) todosLosArchivos = todosLosArchivos.concat(data.entries);
                    tieneMas = data.has_more;
                    cursor = data.cursor;
                }
                
                let filtrados;
                if (usuarioIdentificado === "ADMIN_MASTER") {
                    filtrados = todosLosArchivos.filter(a => a[".tag"] !== "folder");
                } else {
                    filtrados = todosLosArchivos.filter(a => 
                        a[".tag"] !== "folder" && a.name.toUpperCase().includes(usuarioIdentificado.toUpperCase())
                    );
                }
                renderizar(filtrados);
            } catch (e) { 
                lista.innerHTML = '<p class="text-center text-red-500 font-bold p-10">ERROR DE CONEXIÓN</p>';
            }
        }

        async function previsualizar(path, nombre) {
            document.getElementById('visor-nombre').innerText = nombre;
            document.getElementById('visor-modal').style.display = 'flex';
            const frame = document.getElementById('pdf-frame');
            frame.src = "";
            try {
                const res = await fetch('https://api.dropboxapi.com/2/files/get_temporary_link', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${currentToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "path": path })
                });
                const data = await res.json();
                if (data.link) {
                    frame.src = `https://docs.google.com/viewer?url=${encodeURIComponent(data.link)}&embedded=true`;
                    document.getElementById('btn-descargar').href = data.link;
                }
            } catch (e) { alert("Error"); }
        }

        function renderizar(archivos) {
            const lista = document.getElementById('lista-archivos');
            lista.innerHTML = archivos.length ? '' : '<div class="text-center py-20 text-slate-400 uppercase text-[10px] font-bold">No se encontraron documentos</div>';
            
            archivos.sort((a,b) => a.name.localeCompare(b.name)).forEach(archivo => {
                const nombreL = archivo.name.toLowerCase();
                let cp = null;
                for (let k in banderas) { if (nombreL.includes(`_${k}_`) || nombreL.includes(`_${k}.`)) { cp = banderas[k]; break; } }
                const card = `
                    <div class="item fade-in bg-white rounded-2xl shadow-sm border border-slate-200 mb-4 overflow-hidden">
                        <button onclick="previsualizar('${archivo.path_lower}', '${archivo.name}')" class="w-full flex items-center p-4 text-left active:bg-slate-50">
                            <div class="w-12 h-8 flex-shrink-0 bg-slate-100 rounded-lg flex items-center justify-center border border-slate-200 overflow-hidden shadow-inner">
                                ${cp ? `<img src="https://flagcdn.com/w80/${cp}.png" class="h-full w-full object-cover">` : `<span class="text-[8px] font-black text-slate-400">DOC</span>`}
                            </div>
                            <div class="ml-4 flex-1">
                                <h3 class="text-slate-800 font-bold text-[10px] uppercase truncate w-40">${archivo.name.replace('.pdf','').replace(/_/g,' ')}</h3>
                                <p class="text-blue-600 text-[8px] font-black uppercase mt-1 tracking-wider">Ver Certificado ❯</p>
                            </div>
                        </button>
                    </div>`;
                lista.insertAdjacentHTML('beforeend', card);
            });
        }

        function cerrarVisor() { document.getElementById('visor-modal').style.display = 'none'; document.getElementById('pdf-frame').src = ""; }
        function filtrar() {
            const v = document.getElementById('buscador').value.toLowerCase();
            const items = document.getElementsByClassName('item');
            for(let i of items) i.style.display = i.innerText.toLowerCase().includes(v) ? "block" : "none";
        }
