<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4" id="cuerpo">

        function verificar() {
            const input = document.getElementById('pass-input').value;
            if (input === CLAVE_ACCESO) {
                document.getElementById('login-screen').remove();
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('cuerpo').className = "bg-slate-50 block";
                cargarArchivos();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
                document.getElementById('pass-input').value = "";
            }
        }

       async function cargarArchivos() {
    const lista = document.getElementById('lista-archivos');
    lista.innerHTML = '<div class="flex flex-col items-center py-20 text-gray-400"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mb-4"></div><p>Sincronizando certificados...</p></div>';

    try {
        const response = await fetch('https://api.dropboxapi.com/2/files/list_folder', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${DROPBOX_TOKEN}`,
                'Content-Type': 'application/json'
            },
            // El path DEBE estar vacío para leer la carpeta raíz de la App Folder
            body: JSON.stringify({ 
                "path": "", 
                "recursive": false
            })
        });

        const data = await response.json();

        // Si Dropbox nos devuelve un error detallado
        if (data.error_summary) {
            console.error("Detalle técnico:", data.error_summary);
            throw new Error("Dropbox dice: " + data.error_summary);
        }

        if (data.entries) {
            renderizar(data.entries);
        } else {
            lista.innerHTML = '<p class="text-center text-gray-500 py-10">La carpeta está vacía.</p>';
        }

    } catch (error) {
        console.error("Error completo:", error);
        lista.innerHTML = `
            <div class="text-center py-10 px-4 bg-red-50 rounded-2xl border border-red-100">
                <p class="text-red-600 font-bold">Error 400 - Configuración</p>
                <p class="text-red-400 text-[10px] mt-2">${error.message}</p>
                <p class="text-gray-400 text-[9px] mt-4 italic text-balance">Revisa que hayas subido al menos un archivo a la carpeta /Aplicaciones/Tu_App/ en Dropbox.</p>
            </div>`;
    }
}

        async function obtenerEnlaceDirecto(path) {
            try {
                const response = await fetch('https://api.dropboxapi.com/2/files/get_temporary_link', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${DROPBOX_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ path: path })
                });
                const data = await response.json();
                window.open(data.link, '_blank');
            } catch (e) {
                alert("No se pudo abrir el archivo.");
            }
        }

        function renderizar(archivos) {
            const lista = document.getElementById('lista-archivos');
            lista.innerHTML = '';

            // Ordenar alfabéticamente
            archivos.sort((a, b) => a.name.localeCompare(b.name));

            archivos.forEach(archivo => {
                if (archivo[".tag"] === "folder") return;

                const nombreLower = archivo.name.toLowerCase();
                let codigoPais = null;
                
                // Detectar código de país entre guiones bajos (ej: _be_)
                for (let cp in banderas) {
                    if (nombreLower.includes(`_${cp}_`)) { 
                        codigoPais = banderas[cp]; 
                        break; 
                    }
                }

                const card = `
                    <div class="item-conductor fade-in bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden boton-archivo active:bg-blue-50 transition-all">
                        <button onclick="obtenerEnlaceDirecto('${archivo.path_lower}')" class="w-full flex items-center p-4 text-left">
                            <div class="w-14 h-10 flex-shrink-0 bg-slate-50 rounded-lg flex items-center justify-center overflow-hidden border border-slate-100 shadow-inner">
                                ${codigoPais ? 
                                    `<img src="https://flagcdn.com/w80/${codigoPais}.png" class="h-full object-cover">` : 
                                    `<span class="text-[10px] font-black text-slate-300">DOC</span>`
                                }
                            </div>
                            <div class="ml-4 flex-1">
                                <h3 class="text-slate-800 font-bold text-sm uppercase leading-tight truncate">
                                    ${archivo.name.replace('.pdf','').replace(/_/g,' ')}
                                </h3>
                                <div class="flex items-center mt-1">
                                    <span class="text-blue-600 text-[10px] font-black tracking-widest">ABRIR</span>
                                    <span class="text-slate-200 mx-2 text-xs">|</span>
                                    <span class="text-slate-400 text-[10px] uppercase">${archivo.name.split('.').pop()}</span>
                                </div>
                            </div>
                            <div class="text-slate-200 ml-2">❯</div>
                        </button>
                    </div>`;
                lista.insertAdjacentHTML('beforeend', card);
            });
        }

        function filtrar() {
            const val = document.getElementById('buscador').value.toLowerCase();
            const items = document.getElementsByClassName('item-conductor');
            for(let i of items) { i.style.display = i.innerText.toLowerCase().includes(val) ? "block" : "none"; }
        }
    </script>
